media:
  input: public/images
  output: /images

content:
  - name: homepage
    label: "1. Brand & Header Setup"
    type: file
    path: src/content/homepage.json
    format: json
    fields:
      - name: welcome_title
        label: "Main Header Brand Title"
        type: string
      - name: tagline
        label: "Sub-Header High-Impact Hook (Keep under 15 words)"
        type: text
      - name: background_image
        label: "Widescreen Edge-to-Edge Hero Image"
        type: image

  - name: reviews
    label: "2. Guest Reviews Marquee"
    type: file
    path: src/content/reviews.json
    format: json
    list: true
    fields:
      - name: stars
        label: "Star Rating Selection"
        type: select
        options:
          - "5 Stars"
          - "4 Stars"
          - "3 Stars"
        default: "5 Stars"
      - name: content
        label: "Review Quote Content"
        type: text
      - name: author_name
        label: "Guest Name"
        type: string
      - name: platform
        label: "Review Source Platform"
        type: select
        options:
          - "Google Review"
          - "Booking.com"
          - "Traveloka"
        default: "Google Review"

  - name: rooms
    label: "3. Rooms & Suites Showcase"
    type: file
    path: src/content/rooms.json
    format: json
    list: true
    fields:
      - name: title
        label: "Room Type Title (e.g., Superior Twin Room)"
        type: string
      - name: image
        label: "Room Feature Photo"
        type: image
      - name: bed_type
        label: "Bed Configuration Setup"
        type: string
      - name: capacity
        label: "Max Guest Capacity"
        type: string
      - name: size
        label: "Room Dimensions (e.g., 24 m²)"
        type: string
      - name: price_start
        label: "Starting From Price Indicator (e.g., Rp 785.000)"
        type: string

  - name: events
    label: "4. Convention & Events Spaces"
    type: file
    path: src/content/events.json
    format: json
    list: true
    fields:
      - name: hall_name
        label: "Meeting Room / Ballroom Name"
        type: string
      - name: capacity_theater
        label: "Max Seating Capacity (Theater Style)"
        type: string
      - name: main_feature
        label: "Primary Facility Feature Highlight"
        type: string
