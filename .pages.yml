media:
  input: public/images
  output: /images

content:
  - name: homepage
    label: "Homepage Customization"
    type: file
    path: src/content/homepage.json
    format: json
    fields:
      - name: welcome_title
        label: "Main Header Title"
        type: string
        
      - name: tagline
        label: "Hotel Tagline/Description Paragraph"
        type: text

      - name: background_image
        label: "Front Photo or Slideshow GIF"
        type: image

      - name: booking_button_text
        label: "Booking Button Text"
        type: string

  - name: reviews
    label: "Guest Reviews Marquee"
    type: file
    path: src/content/reviews.json
    format: json
    list: true
    fields:
      - name: stars
        label: "Star Rating Selection"
        type: select
        options:
          - label: "5 Stars (Excellent)"
            value: "5"
          - label: "4 Stars (Very Good)"
            value: "4"
          - label: "3 Stars (Average)"
            value: "3"
        default: "5"
      - name: content
        label: "Review Quote Content"
        type: text
      - name: author_name
        label: "Guest Name (Optional)"
        type: string
      - name: platform
        label: "Review Source Platform"
        type: select
        options:
          - label: "Google"
            value: "Google Review"
          - label: "Booking.com"
            value: "Booking.com"
          - label: "Traveloka"
            value: "Traveloka"
        default: "Google Review"
