media:
  input: public/images
  output: /images

content:
  - name: homepage
    label: "1. Brand & Header Setup"
    type: file
    path: src/content/homepage.json
    format: json
    fields:
      - name: welcome_title
        label: "Main Header Brand Title"
        type: string
      - name: logo_text
        label: "Navbar Brand Name"
        type: string
      - name: logo_image
        label: "Navbar Brand Logo Image"
        type: image
      - name: tagline
        label: "Sub-Header High-Impact Hook"
        type: text

      # THIS SETS UP THE CAROUSEL LIST EXACTLY LIKE GUEST REVIEWS
      - name: slideshow
        label: "Hero Slideshow Carousel"
        type: array
        list: true
        collapsed: true
        fields:
          - name: slide_image
            label: "Upload / Select Slide Photo"
            type: image

      - name: show_partners
        label: "Display Partners & Awards Row on Website?"
        type: boolean
        default: true

  - name: reviews
    label: "2. Guest Reviews Marquee"
    type: file
    path: src/content/reviews.json
    format: json
    list: true
    collapsed: true
    fields:
      - name: stars
        label: "Star Rating Selection"
        type: select
        options:
          values:
            - "5 Stars"
            - "4 Stars"
            - "3 Stars"
        default: "5 Stars"
      - name: date
        label: "Review Date"
        type: date
      - name: content
        label: "Review Quote Content"
        type: text
      - name: author_name
        label: "Guest Name"
        type: string
      - name: platform
        label: "Review Source Platform"
        type: select
        options:
          values:
            - "Google Review"
            - "Booking.com"
            - "Traveloka"
        default: "Google Review"

  - name: rooms
    label: "3. Rooms & Suites Showcase"
    type: file
    path: src/content/rooms.json
    format: json
    list: true
    collapsed: true
    fields:
      - name: title
        label: "Room Type Title"
        type: string
      - name: description
        label: "Short Elegant Description"
        type: text
      - name: image
        label: "Room Feature Photo"
        type: image
      - name: bed_type
        label: "Bed Configuration Setup"
        type: string
      - name: capacity
        label: "Max Guest Capacity"
        type: string
      - name: view
        label: "Room View (e.g., Garden View)"
        type: string
      - name: features
        label: "Features & Amenities"
        type: array
      - name: features[*]
        type: string
