# pages.yml # ROOT LEVEL MEDIA ENGINE MANAGERS
media:
  input: public/images
  output: /images

content:
  - name: homepage
    label: "1. Brand & Header Setup"
    type: file
    path: src/content/homepage.json
    format: json
    fields:
      - name: welcome_title
        label: "Main Header Brand Title"
        type: string
      - name: logo_text
        label: "Navbar Brand Name"
        type: string
      - name: logo_image
        label: "Navbar Brand Logo Image"
        type: image
      - name: tagline
        label: "Sub-Header High-Impact Hook"
        type: text
      - name: hero_image
        label: "Hero Cover Photo"
        type: image
      - name: show_partners
        label: "Display Partners & Awards Row on Website?"
        type: boolean
        default: true
      - name: show_promotion
        label: "Display Live Promotional Banner on Website?"
        type: boolean
        default: false

  - name: reviews
    label: "2. Guest Reviews Marquee"
    type: file
    path: src/content/reviews.json
    format: json
    list: true
    collapsed: true
    fields:
      - name: stars
        label: "Star Rating Selection"
        type: select
        options:
          values:
            - "5 Stars"
            - "4 Stars"
            - "3 Stars"
        default: "5 Stars"
      - name: date
        label: "Review Date"
        type: date
      - name: content
        label: "Review Quote Content"
        type: text
      - name: author_name
        label: "Guest Name"
        type: string
      - name: platform
        label: "Review Source Platform"
        type: select
        options:
          values:
            - "Google Review"
            - "Booking.com"
            - "Traveloka"
        default: "Google Review"

  - name: rooms
    label: "3. Rooms & Suites Showcase"
    type: file
    path: src/content/rooms.json
    format: json
    list: true
    collapsed: true
    fields:
      - name: title
        label: "Room Type Title"
        type: string
      - name: description
        label: "Short Elegant Description"
        type: text
      - name: image
        label: "Main Feature Photo (Cover)"
        type: image
      - name: room_gallery1
        label: "Additional Room Gallery Photos"
        type: image
      - name: room_gallery2
        label: "Additional Room Gallery Photos"
        type: image
      - name: room_gallery3
        label: "Additional Room Gallery Photos"
        type: image
      - name: bed_type
        label: "Bed Configuration Setup"
        type: string
      - name: capacity
        label: "Max Guest Capacity"
        type: string
      - name: view
        label: "Room View (e.g., Garden View)"
        type: string
      - name: features
        label: "Features & Amenities"
        type: string
        list: true

  - name: events
    label: "4. Convention & Events Spaces"
    type: file
    path: src/content/events.json
    format: json
    list: true
    collapsed: true
    fields:
      - name: hall_name
        label: "Meeting Room / Ballroom Name"
        type: string
      - name: capacity_theater
        label: "Max Seating Capacity"
        type: string
      - name: main_feature
        label: "Primary Facility Feature Highlight"
        type: string

  - name: features
    label: "5. Core Experience Highlights"
    type: file
    path: src/content/features.json
    format: json
    list: true
    collapsed: true
    fields:
      - name: title
        label: "Highlight Title"
        type: string
      - name: description
        label: "Short Elegant Description"
        type: text

  - name: stories
    label: "6. Editorial Story Blocks"
    type: file
    path: src/content/stories.json
    format: json
    list: true
    collapsed: true
    fields:
      - name: title
        label: "Section Title Heading"
        type: string
      - name: subtitle
        label: "Small Tagline Category"
        type: string
      - name: text_content
        label: "Detailed Descriptive Paragraph"
        type: text
      - name: start_date
        label: "Publishing Start Date"
        type: date
      - name: expiry_date
        label: "Expiry Date"
        type: date
      - name: story_image
        label: "Feature Story Photo Asset"
        type: image

  - name: badges
    label: "7. Awards & OTA Partners"
    type: file
    path: src/content/badges.json
    format: json
    list: true
    collapsed: true
    fields:
      - name: name
        label: "Partner Name"
        type: string
      - name: subtitle
        label: "Score/Label Notation"
        type: string

  - name: promotion
    label: "8. Promotions & Offers Banner"
    type: file
    path: src/content/promotion.json
    format: json
    fields:
      - name: banner_bg_type
        label: "Background Mode Display Option"
        type: select
        options:
          values:
            - "Photo Background"
            - "Exciting Sunset Gold"
            - "Deep Premium Blue"
        default: "Photo Background"
      - name: banner_bg_image
        label: "Promo Background Photo File"
        type: image
        required: false
      - name: cta_title
        label: "Promo Headline Title"
        type: string
      - name: cta_desc
        label: "Promo Offer Details Paragraph"
        type: text
      - name: cta_btn_text
        label: "Promo Button Action text"
        type: string

  - name: attractions
    label: "9. Local Attractions Guide"
    type: file
    path: src/content/attractions.json
    format: json
    list: true
    collapsed: true
    fields:
      - name: title
        label: "Attraction Location Name"
        type: string
      - name: distance
        label: "Distance Proximity (e.g., 0.9 Miles / 15 Min Walk)"
        type: string
      - name: tagline
        label: "Short Promo Subtitle Tagline"
        type: string
      - name: category
        label: "Classification Category (e.g., City Center, Nature)"
        type: string
      - name: image
        label: "Showcase Feature Photo"
        type: image
      - name: photo_credit
        label: "Photo Credit (Optional)"
        type: string
        required: false
      - name: description
        label: "Historical / Travel Description"
        type: text

  - name: gallery
    label: "10. Dynamic Art Gallery"
    type: file
    path: src/content/gallery.json
    format: json
    list: true
    collapsed: true
    fields:
      - name: id
        label: "Unique Item Identification Code"
        type: string
      - name: title
        label: "Artwork or Antique Name"
        type: string
      - name: image
        label: "Showcase Photo Asset"
        type: image
      - name: description
        label: "Historical / Curated Description Paragraph"
        type: text

  - name: qna_section
    label: "11. Frequently Asked Questions (Q&A)"
    type: file
    path: src/content/qna.json
    format: json
    fields:
      - name: section_title
        label: "Section Heading Title"
        type: string
        default: "Frequently Asked Questions"
      - name: section_subtitle
        label: "Section Subtitle Context Hook"
        type: text
        default: "Find quick answers about our luxury accommodations, boutique booking terms, and heritage convention spaces."
      - name: faqs
        label: "Manage Question & Answer List Entries"
        type: list
        minimize: true
        fields:
          - name: question
            label: "Guest Question Text String"
            type: string
          - name: answer
            label: "Detailed Answer Response text block"
            type: text

  - name: footer_section
    label: "12. Global Site Footer"
    type: file
    path: src/content/footer.json
    format: json
    fields:
      - name: footer_slogan
        label: "Footer Brand Slogan Text"
        type: text
        default: "Providing an impeccable blend of luxury hospitality and high-performance corporate event execution in the heart of Bandung City."
      - name: concierge_address
        label: "Physical Address Location"
        type: text
        default: "Jalan Kebon Kawung No. 60, Bandung, West Java, Indonesia"
      - name: concierge_phone
        label: "Contact Phone Label (For Display)"
        type: string
        default: "+62 (022) 420 0888"
      - name: concierge_phone_raw
        label: "System Dial Number (No spaces/brackets, e.g. +62224200888)"
        type: string
        default: "+62224200888"
      - name: concierge_email
        label: "General Operations Email Address"
        type: string
        default: "info@mutiarahotel.com"
      - name: instagram_url
        label: "Official Instagram Profile URL Link"
        type: string
        required: false
      - name: facebook_url
        label: "Official Facebook Page URL Link"
        type: string
        required: false
      - name: youtube_url
        label: "Official YouTube Channel URL Link"
        type: string
        required: false
      - name: privacy_content
        label: "Privacy Charter & T&C Document (Supports line breaks)"
        type: text
  - name: booking_toast
    label: "13. Smart Engagement Prompt"
    type: file
    path: src/content/booking_toast.json
    format: json
    fields:
      - name: initial_threshold_seconds
        label: "Initial Browsing Delay Before First Appearance (Seconds)"
        type: number
        default: 30
      - name: cooldown_loop_minutes
        label: "Loop Reminder Timing After Guest Closes It (Minutes)"
        type: number
        default: 3
      - name: badge_icon
        label: "Concierge Status Icon Badge"
        type: string
        default: "🛎️"
      - name: heading
        label: "Prompt Headline Title"
        type: string
        default: "Are you ready to book?"
      - name: description
        label: "Concierge Assistance Text Paragraph"
        type: text
        default: "Don't hesitate to contact our concierge desk directly for the best guaranteed group rates and localized suite packages."
      - name: call_button_text
        label: "Telephone Link Action Text"
        type: string
        default: "📞 Call Desk"
      - name: call_phone_number
        label: "System Dialing Phone Number (No spaces/symbols)"
        type: string
        default: "+62224200888"
      - name: email_button_text
        label: "Email Masking Button Action Text"
        type: string
        default: "✉️ Email Us"
 - name: restaurants
    label: "14. Culinary & Restaurant Guide"
    type: file
    path: src/content/restaurants.json
    format: json
    fields:
      - name: page_description
        label: "Main Page Description / Hook Text"
        type: text
        default: "From traditional Sundanese family recipes right inside our venue complex to the legendary culinary street paths of Bandung."
      - name: breakfast_notice
        label: "Breakfast Advisory Note / Disclaimer Text"
        type: text
        default: "Please note that Mutiara Hotel does not offer an in-house breakfast service; however, our prime location is surrounded by an abundance of legendary Bandung local street food and culinary spots waiting to be explored right at our doorstep."
      
      # 🟢 THIS GENERATES THE REPEATABLE LIST + ADD BUTTON INSIDE A FILE CONTAINER
      - name: items
        label: "Restaurant Listings Grid"
        widget: list
        minimize: true
        collapsed: true
        summary: '{{fields.title}}'
        fields:
          - name: title
            label: "Restaurant / Venue Name"
            type: string
          - name: distance
            label: "Distance Proximity (e.g., 0.1 km / 5 Min Walk)"
            type: string
          - name: tagline
            label: "Short Promo Subtitle Tagline"
            type: string
          - name: cuisine_type
            label: "Cuisine Type Classification (Tiny Photo Label)"
            type: string
          - name: image
            label: "Showcase Feature Photo"
            type: image
          - name: website_url
            label: "Official Restaurant Website Link (Optional URL)"
            type: string
            required: false
